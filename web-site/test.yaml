---
# Source: web-site/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: cloudlab
  labels:
    helm.sh/chart: web-site-1.0.0
    app.kubernetes.io/name: cloudlab
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: cloudlab
---
# Source: web-site/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudlab
  labels:
    helm.sh/chart: web-site-1.0.0
    app.kubernetes.io/name: cloudlab
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudlab
  template:
    metadata:
      labels:
        helm.sh/chart: web-site-1.0.0
        app.kubernetes.io/name: cloudlab
        app.kubernetes.io/version: "1.0.0"
        app.kubernetes.io/managed-by: Helm
    spec:
      imagePullSecrets:
        - name: harbor-registry-secret
      serviceAccountName: default
      containers:
        - name: web-site
          image: "harbor.cloudlab.rocks/public/cloudlab:latest"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
---
# Source: web-site/templates/hpa.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cloudlab
  labels:
    helm.sh/chart: web-site-1.0.0
    app.kubernetes.io/name: cloudlab
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cloudlab
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# Source: web-site/templates/ingressroute.yaml
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cloudlab
  labels:
    helm.sh/chart: web-site-1.0.0
    app.kubernetes.io/name: cloudlab
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  entryPoints:
        - "web"
  routes:
    - match: Host(`cloudlab.pi.k8s.lab.int`)
      kind: Rule
      services:
        - name: cloudlab-svc
          port: 80